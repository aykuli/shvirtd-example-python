include:
  - proxy.yaml

services:
  web:
    image: cr.yandex/crpi5lfj1ah372dcbvrk/py-web-app:1.0.0
    container_name: web
    build:
      context: .
      dockerfile: Dockerfile.python
    restart: always
    depends_on:
      - db
    ports:
      - 5000:5000
    environment:
      - DB_HOST=db
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
    networks:
      backend:
        ipv4_address: 172.20.0.5

  db:
    image: mysql:8
    container_name: db
    restart: always
    env_file:
      - .env
    networks:
      backend:
        ipv4_address: 172.20.0.10
